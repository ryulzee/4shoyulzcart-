<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4shoyulz Cart | Track Your Orders</title>

<meta name="theme-color" content="#111111">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="icon" href="favicon.png">

</head>

<body>

<div id="loading-screen">

<div class="loader"></div>

<p>Loading...</p>

</div>

<div class="container">

<header>

<h1>4shoyulz Cart</h1>

<p class="subtitle">

Track Your Orders ♡

</p>

</header>

<section class="search-section">

<input
type="text"
id="searchInput"
placeholder="Enter your Telegram username"
autocomplete="off"
>

<button id="searchBtn">

Track Order

</button>

</section>

<section id="resultSection" class="hidden">

<h2 id="buyerTitle">

Orders

</h2>

<p id="totalOrders">

0 Orders Found

</p>

<div id="ordersContainer">

</div>

</section>

<section id="emptyState" class="hidden">

<h3>

No orders found

</h3>

<p>

Please check your Telegram username and try again.

</p>

</section>

<footer>

<p>

© 2026 4shoyulz Cart

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
