<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard • 4SHOYULZ CART</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="dashboard">

    <header class="topbar">

        <div>

            <h1>4SHOYULZ CART</h1>

            <p>Admin Dashboard</p>

        </div>

        <button id="logoutBtn">
            Logout
        </button>

    </header>

    <section class="stats">

        <div class="stat-card">

            <h2 id="totalOrders">0</h2>

            <p>Total Orders</p>

        </div>

        <div class="stat-card">

            <h2 id="totalBuyers">0</h2>

            <p>Buyers</p>

        </div>

        <div class="stat-card">

            <h2 id="completedOrders">0</h2>

            <p>Completed</p>

        </div>

    </section>

    <section class="actions">

        <button id="addOrderBtn">
            + Add Order
        </button>

    </section>

    <section class="recent">

        <h2>Recent Orders</h2>

        <div id="recentOrders">

            <p>No orders yet.</p>

        </div>

    </section>

</div>

<script src="dashboard.js"></script>

</body>

</html>
