<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard • 4SHOYULZ CART</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="admin-layout">

    <aside class="sidebar">

        <h2>4SHOYULZ</h2>

        <nav>

    <a href="dashboard.html" class="nav-btn active">
        Dashboard
    </a>

    <a href="orders.html" class="nav-btn">
        Orders
    </a>

    <a href="notices.html" class="nav-btn">
        Notices
    </a>

    <a href="settings.html" class="nav-btn">
        Settings
    </a>

        </nav>

        <button id="logoutBtn">
            Logout
        </button>

    </aside>

    <main class="content">

    <h1>Dashboard</h1>

    <div class="stats">

        <div class="stat-card">
            <h3>Total Orders</h3>
            <p id="totalOrders">0</p>
        </div>


        <div class="stat-card">
            <h3>Total Buyers</h3>
            <p id="totalBuyers">0</p>
        </div>


        <div class="stat-card">
            <h3>Completed</h3>
            <p id="completedOrders">0</p>
        </div>

    </div>


    <section class="recent">

        <h2>Recent Orders</h2>

        <div id="recentOrders"></div>

    </section>

    </main>

</div>

    <script src="dashboard.js"></script>
    
</body>
</html>
